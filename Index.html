<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка картинки</title>
    <style>
        /* Сбрасываем отступы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* Контейнер для экрана загрузки */
        #loader-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease; /* Плавное исчезновение */
        }

        /* Анимация кружочка загрузки */
        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Настройки самой картинки */
        #main-image {
            max-width: 90%;
            max-height: 90vh;
            opacity: 0; /* Скрыта по умолчанию */
            transition: opacity 0.5s ease; /* Плавное появление */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <p>Загрузка изображения...</p>
    </div>

    <img id="main-image" src="IMG_20260329_160934_556.PNG" alt=" ">
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const image = document.getElementById('main-image');
            const loader = document.getElementById('loader-container');

            // Функция, которая скрывает загрузку и показывает картинку
            function showImage() {
                loader.style.opacity = '0';
                image.style.opacity = '1';
                
                // Удаляем элемент загрузки из DOM после завершения анимации
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500); // 500мс совпадают с transition: opacity 0.5s в CSS
            }

            // Проверяем, не загрузилась ли картинка до того, как сработал скрипт (например, из кэша)
            if (image.complete) {
                showImage();
            } else {
                // Ждем события полной загрузки картинки
                image.addEventListener('load', showImage);
                
                // Обработка ошибки, если картинка не найдена
                image.addEventListener('error', function() {
                    loader.innerHTML = '<p style="color: red;">Ошибка: Не удалось загрузить изображение.</p>';
                });
            }
        });
    </script>
</body>
</html>
